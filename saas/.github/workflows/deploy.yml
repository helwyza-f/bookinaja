name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Masuk ke folder project
            cd ~/be || (git clone https://github.com/helwyza-f/be.git ~/be && cd ~/be)
            
            # 2. Paksa tarik kode terbaru dari GitHub (Overriding local changes)
            # Pastikan kamu sudah setup git credential/token di EC2 agar tidak minta password
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Update file .env dari GitHub Secrets
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # 4. Matikan container lama secara total biar tidak bentrok
            sudo docker-compose down
            
            # 5. Build ulang dari Dockerfile dan jalankan di background
            # Pastikan RAM/Swap 2GB di EC2 sudah aktif agar build tidak stuck
            sudo docker-compose up --build -d
            
            # 6. Bersihkan image lama yang sudah tidak terpakai (Dangling images)
            sudo docker image prune -f