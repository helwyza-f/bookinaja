name: Fast Deploy Bookinaja Monorepo to IDCloudHost

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. GENERATE .ENV DARI SECRETS ---
      - name: Create Environment Files
        run: |
          echo "${{ secrets.BE_ENV }}" > backend/.env
          echo "${{ secrets.FE_ENV }}" > frontend/.env

      # --- 2. BUILD BACKEND (GO) ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build Backend Binary
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main cmd/api/main.go

      # --- 3. BUILD FRONTEND (NEXT.JS) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Build Frontend Standalone
        env:
          NEXT_PUBLIC_API_URL: https://bookinaja.com/api/v1
        run: |
          cd frontend
          # rm -rf .next 
          npm install
          npm run build

      # --- 4. PRE-CLEAN VPS ---
      - name: Reset Environment on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/bookinaja/backend ~/bookinaja/frontend
            rm -f ~/bookinaja/backend/main
            rm -f ~/bookinaja/backend/.env
            rm -f ~/bookinaja/frontend/.env
            rm -rf ~/bookinaja/frontend/.next

      # --- 5. TRANSFER FILES (SCP) ---
      - name: Transfer Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/main,backend/migrations,backend/internal,backend/Dockerfile,backend/.env,frontend/.next/standalone,frontend/.next/static,frontend/public,frontend/Dockerfile,frontend/.env,docker-compose.yml"
          target: "~/bookinaja"
          strip_components: 0
          overwrite: true

      # --- 6. RESTART DOCKER ON VPS (FIXED COMMAND) ---
      - name: Execute Docker Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/bookinaja
            # FIX: Gunakan 'docker compose' (spasi) bukan 'docker-compose' (strip)
            sudo docker compose down
            sudo docker compose up --build -d
            # Bersihkan image sampah agar disk VPS tidak penuh
            sudo docker image prune -f
