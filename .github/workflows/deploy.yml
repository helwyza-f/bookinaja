name: Fast Deploy Bookinaja Monorepo to IDCloudHost

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. GENERATE .ENV DARI SECRETS (RESET SETIAP DEPLOY) ---
      # Gunakan secret baru: BE_ENV (untuk Go) dan FE_ENV (untuk Next.js)
      - name: Create Environment Files
        run: |
          echo "${{ secrets.BE_ENV }}" > saas/.env
          echo "${{ secrets.FE_ENV }}" > saas-app/.env

      # --- 2. BUILD BACKEND (GO) ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build Backend Binary
        run: |
          cd saas
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main cmd/api/main.go

      # --- 3. BUILD FRONTEND (NEXT.JS) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "saas-app/package-lock.json"
      - name: Build Frontend Standalone
        env:
          # Pastikan URL API mengarah ke domain Bookinaja di VPS baru
          NEXT_PUBLIC_API_URL: https://bookinaja.com/api/v1
        run: |
          cd saas-app
          npm install
          npm run build

      # --- 4. PRE-CLEAN VPS (Bersihkan residu lama) ---
      - name: Reset Environment on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/bookinaja/saas ~/bookinaja/saas-app
            rm -f ~/bookinaja/saas/main
            rm -f ~/bookinaja/saas/.env
            rm -f ~/bookinaja/saas-app/.env
            rm -rf ~/bookinaja/saas-app/.next

      # --- 5. TRANSFER FILE MATENG KE VPS ---
      - name: Transfer Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "saas/main,saas/migrations,saas/internal,saas/Dockerfile,saas/.env,saas-app/.next/standalone,saas-app/.next/static,saas-app/public,saas-app/Dockerfile,saas-app/.env,docker-compose.yml"
          target: "~/bookinaja"
          strip_components: 0
          overwrite: true

      # --- 6. RESTART DOCKER (IDCLOUDHOST) ---
      - name: Execute Docker Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/bookinaja
            # Down untuk memastikan volume database baru terpasang (jika ada perubahan)
            sudo docker-compose down
            # Build ulang dengan image baru
            sudo docker-compose up --build -d
            # Bersihkan image sampah agar storage VPS (20GB) tidak penuh
            sudo docker image prune -f
