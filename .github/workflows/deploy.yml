name: Fast Deploy Bookinaja Monorepo to IDCloudHost

on:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Environment Files
        run: |
          printf '%s\n' "${{ secrets.BE_ENV }}" > backend/.env
          printf '%s\n' "${{ secrets.FE_ENV }}" > frontend/.env
          if [ -n "${{ secrets.BE_MQTT_CA_CERT_PEM }}" ]; then
            sed -i '/^MQTT_CA_CERT_PATH=/d' backend/.env
            sed -i '/^MQTT_CA_CERT_PEM=/d' backend/.env
            printf 'MQTT_CA_CERT_PATH=\n' >> backend/.env
            printf 'MQTT_CA_CERT_PEM=%s\n' "${{ secrets.BE_MQTT_CA_CERT_PEM }}" >> backend/.env
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run Backend Tests
        run: |
          cd backend
          go test ./...

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Lint
        run: |
          cd frontend
          npm run lint

      - name: Run Frontend Build
        env:
          NEXT_PUBLIC_API_URL: https://bookinaja.com/api/v1
        run: |
          cd frontend
          npm run build

  build-and-deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 1. GENERATE .ENV DARI SECRETS ---
      - name: Create Environment Files
        run: |
          printf '%s\n' "${{ secrets.BE_ENV }}" > backend/.env
          printf '%s\n' "${{ secrets.FE_ENV }}" > frontend/.env
          if [ -n "${{ secrets.BE_MQTT_CA_CERT_PEM }}" ]; then
            sed -i '/^MQTT_CA_CERT_PATH=/d' backend/.env
            sed -i '/^MQTT_CA_CERT_PEM=/d' backend/.env
            printf 'MQTT_CA_CERT_PATH=\n' >> backend/.env
            printf 'MQTT_CA_CERT_PEM=%s\n' "${{ secrets.BE_MQTT_CA_CERT_PEM }}" >> backend/.env
          fi

      # --- 2. BUILD BACKEND (GO) ---
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build Backend Binary
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o main cmd/api/main.go

      # --- 3. BUILD FRONTEND (NEXT.JS) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Build Frontend Standalone
        env:
          NEXT_PUBLIC_API_URL: https://bookinaja.com/api/v1
        run: |
          cd frontend

          npm ci
          npm run build

      # --- 4. PRE-CLEAN VPS ---
      - name: Reset Environment on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/bookinaja/backend ~/bookinaja/frontend
            rm -f ~/bookinaja/backend/main
            rm -rf ~/bookinaja/backend/migrations
            rm -rf ~/bookinaja/backend/internal
            rm -rf ~/bookinaja/backend/cmd
            rm -f ~/bookinaja/backend/go.mod
            rm -f ~/bookinaja/backend/go.sum
            rm -f ~/bookinaja/backend/.env
            rm -f ~/bookinaja/frontend/.env
            rm -rf ~/bookinaja/frontend/.next

      # --- 5. TRANSFER FILES (SCP) ---
      - name: Transfer Files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "backend/main,backend/migrations,backend/internal,backend/Dockerfile,backend/.env,frontend/.next/standalone,frontend/.next/static,frontend/public,frontend/Dockerfile,frontend/.env,docker-compose.yml"
          target: "~/bookinaja"
          strip_components: 0
          overwrite: true

      # --- 6. RESTART DOCKER ON VPS ---
      - name: Execute Docker Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/bookinaja
            sudo docker compose down
            sudo docker compose up --build -d
            sudo docker image prune -f
