version: "3.8"

services:
  # Database Postgres
  postgres_db:
    image: postgres:15-alpine
    container_name: bookinaja_db_dev
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: bookinaja_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  # Redis Cache & Session
  redis_cache:
    image: redis:7-alpine
    container_name: bookinaja_redis_dev
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --loglevel warning

volumes:
  postgres_data_dev:
